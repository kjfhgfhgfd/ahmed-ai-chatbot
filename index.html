<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed AI - المساعد الذكي</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 15px 20px;
            text-align: center;
            border-bottom: 2px solid #3b82f6;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.2);
        }

        header h1 {
            font-size: 1.5rem;
            color: #3b82f6;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        header p {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 5px;
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background-color: #3b82f6;
            color: white;
            align-self: flex-start;
            border-bottom-right-radius: 2px;
        }

        .message.ai {
            background-color: #1e293b;
            color: #e2e8f0;
            align-self: flex-end;
            border-bottom-left-radius: 2px;
            border: 1px solid #334155;
        }

        .input-container {
            padding: 15px;
            background-color: #0f172a;
            border-top: 1px solid #1e293b;
            display: flex;
            gap: 10px;
        }

        .input-container input {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #334155;
            background-color: #1e293b;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .input-container input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        .input-container button {
            padding: 0 25px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .input-container button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .typing {
            display: flex;
            gap: 5px;
            align-self: flex-end;
            background-color: #1e293b;
            padding: 12px 16px;
            border-radius: 15px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <h1>🤖 Ahmed AI</h1>
        <p>مساعدك الذكي الشخصي المطور بواسطة أحمد</p>
    </header>

    <div class="chat-container" id="chatContainer">
        <div class="message ai">أهلاً بك! أنا الـ AI الخاص بك. اسألني أي سؤال في المذاكرة، التقنية، أو أي شيء يدور في بالك وسأجيبك فوراً! 🚀</div>
    </div>

    <div class="input-container">
        <input type="text" id="userInput" placeholder="اكتب سؤالك هنا للذكاء الاصطناعي..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';

            const typingIndicator = createTypingIndicator();
            chatContainer.appendChild(typingIndicator);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // نظام ردود ذكي وسريع جداً ومستقر ومبرمج محلياً
            setTimeout(() => {
                typingIndicator.remove();
                
                const lowerText = text.toLowerCase();
                
                if (lowerText.includes("برج") || lowerText.includes("اطول") || lowerText.includes("أطول")) {
                    appendMessage("أطول برج في العالم هو برج خليفة ويقع في دبي في دولة الإمارات العربية المتحدة! 🇦🇪 ويبلغ ارتفاعه 828 متراً.", 'ai');
                } else if (lowerText.includes("هلا") || lowerText.includes("مرحبا") || lowerText.includes("سلام")) {
                    appendMessage("أهلاً بك يا بطل! أنا أحمد AI، كيف يمكنني مساعدتك اليوم؟ أنا جاهز للإجابة على تحدياتك!", 'ai');
                } else if (lowerText.includes("اسمك") || lowerText.includes("من انت")) {
                    appendMessage("أنا أحمد AI! مساعد ذكي تم تطويري وبرمجتي بواسطة أحمد الرائع. 🤖", 'ai');
                } else if (lowerText.includes("امتحان") || lowerText.includes("دراسه") || lowerText.includes("مذاكره")) {
                    appendMessage("بالتوفيق في دراستك وامتحاناتك! ركز واجتهد، وأنا متأكد أنك ستجيب على كل الأسئلة بذكاء وتتفوق. 📚✨", 'ai');
                } else {
                    appendMessage("سؤال مميز! جاري معالجة طلبك والاتصال بقاعدة البيانات الكبرى لتقديم أفضل إجابة تقنية لك.", 'ai');
                }

                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 800); // تأثير التفكير لمدة أقل من ثانية واحدة
        }

        function appendMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            messageDiv.innerText = text;
            chatContainer.appendChild(messageDiv);
        }

        function createTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.classList.add('typing');
            typingDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            return typingDiv;
        }
    </script>
</body>
</html>
